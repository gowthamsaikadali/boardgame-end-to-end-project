trigger:
- main

pool:
  name: SelfHostedPool

variables:
- group: New variable group 05-Apr

steps:

- checkout: self

- script: |
    cd board
    mvn clean package
  displayName: Build Java App

- script: |
    cd board
    mvn sonar:sonar \
      -Dsonar.host.url=$(SONAR_HOST_URL) \
      -Dsonar.login=$(SONAR_TOKEN)
  displayName: SonarQube Scan

- script: |
    docker build -t $(IMAGE_NAME):v1 ./board
  displayName: Docker Build

- script: |
    trivy image $(IMAGE_NAME):v1
  displayName: Trivy Security Scan

# Connect to AKS
- task: AzureCLI@2
  displayName: Connect to AKS
  inputs:
    azureSubscription: 'azure-sc'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      az aks get-credentials \
        --resource-group gowtham-rg \
        --name $(AKS_CLUSTER) \
        --overwrite-existing

# ADD THIS (VERY IMPORTANT)
- task: AzureCLI@2
  displayName: Login to ACR
  inputs:
    azureSubscription: 'azure-sc'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      az acr login --name $(ACR_NAME)

- script: |
    docker tag $(IMAGE_NAME):v1 $(ACR_NAME).azurecr.io/$(IMAGE_NAME):v1
  displayName: Tag Image

- script: |
    docker push $(ACR_NAME).azurecr.io/$(IMAGE_NAME):v1
  displayName: Push Image

- script: |
    kubectl apply -f board/k8s/
  displayName: Deploy to AKS