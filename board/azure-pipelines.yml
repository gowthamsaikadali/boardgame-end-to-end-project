trigger:
- main

pool:
  name: SelfHostedPool

variables:
- group: "New variable group 06-Apr"

steps:

- checkout: self

- script: |
    cd board
    mvn clean package
  displayName: Build Java App

- script: |
    cd board
    mvn sonar:sonar \
      -Dsonar.host.url=$(SONAR_HOST_URL) \
      -Dsonar.login=$(SONAR_TOKEN)
  displayName: SonarQube Scan

- script: |
    docker build -t $(IMAGE_NAME):v1 ./board
  displayName: Docker Build

- script: |
    trivy image $(IMAGE_NAME):v1
  displayName: Trivy Security Scan

- script: |
    if ! command -v kubectl &> /dev/null; then
      echo ">>> Installing kubectl..."
      curl -LO "https://dl.k8s.io/release/$(curl -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      chmod +x kubectl
      sudo mv kubectl /usr/local/bin/kubectl
    else
      echo ">>> kubectl already installed: $(kubectl version --client)"
    fi
  displayName: Install kubectl

- task: AzureCLI@2
  displayName: ACR Login, Tag, Push, AKS Connect & Deploy
  inputs:
    azureSubscription: 'azure-sc'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |

      echo ">>> Logging into ACR..."
      az acr login --name $(ACR_NAME)

      echo ">>> Tagging Docker image..."
      docker tag $(IMAGE_NAME):v1 $(ACR_NAME).azurecr.io/$(IMAGE_NAME):v1

      echo ">>> Pushing image to ACR..."
      docker push $(ACR_NAME).azurecr.io/$(IMAGE_NAME):v1

      echo ">>> Attaching ACR to AKS so it can pull images..."
      az aks update \
        --resource-group gowtham-rg \
        --name $(AKS_CLUSTER) \
        --attach-acr $(ACR_NAME)

      echo ">>> Fetching AKS credentials..."
      az aks get-credentials \
        --resource-group gowtham-rg \
        --name $(AKS_CLUSTER) \
        --overwrite-existing

      echo ">>> Deploying to AKS..."
      kubectl apply -f board/k8s/

      echo ">>> Deployment complete. Pods status:"
      kubectl get pods